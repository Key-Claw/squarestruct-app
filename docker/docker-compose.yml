services:
  mysql:
    image: mysql:8.4
    container_name: squarestruct-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: squarestruct
      MYSQL_USER: squareapp
      MYSQL_PASSWORD: Square1234!
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot1234"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - squarestruct_mysql_data:/var/lib/mysql
      - ../backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ../backend/db/seeds.sql:/docker-entrypoint-initdb.d/02-seeds.sql:ro

volumes:
  squarestruct_mysql_data:
